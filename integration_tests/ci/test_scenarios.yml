# Only set if not using default adapter ranges
# dbt_adapter_versions:
#   snowflake: ">=1.3.0,<2.0.0"
#   bigquery: ">=1.3.0,<2.0.0"
#   postgres: ">=1.3.0,<2.0.0"
#   redshift: ">=1.3.0,<2.0.0"
#   databricks: ">=1.6.0,<2.0.0"

schema_variable_name: "netsuite_schema"

include_databricks_sql: true
include_sqlserver: false
include_dbt_compile: true

test_scenarios:
  - name: "Default"
    vars: {}
    include_incremental: false

  - name: "aggregated statements"
    vars:
      netsuite2__aggregate_balance_sheet: true
      netsuite2__aggregate_income_statement: true
    include_incremental: true

  - name: "subsidiary multibook fiscal"
    vars:
      netsuite2__using_to_subsidiary: true
      netsuite2__multibook_accounting_enabled: true
      netsuite2__using_exchange_rate: false
      netsuite2__using_vendor_categories: false
      netsuite2__using_jobs: false
      netsuite2__using_employees: false
      netsuite2__fiscal_calendar_enabled: true
    include_incremental: true

  - name: "exchange rate enabled"
    vars:
      netsuite2__using_to_subsidiary: true
      netsuite2__using_exchange_rate: true
      netsuite2__using_vendor_subsidiary_relationships: false
    include_incremental: false
    warehouses: ["bigquery", "redshift", "postgres", "snowflake"]

  - name: "subsidiary relationships disabled"
    vars:
      netsuite2__using_customer_subsidiary_relationships: false
      netsuite2__using_vendor_subsidiary_relationships: false
    include_incremental: false
    warehouses: ["bigquery", "redshift", "postgres", "snowflake"]